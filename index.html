<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowderSurvival</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
    #game-wrapper { position: relative; }
    #game-container { width: 800px; height: 600px; }
    #loading { position: absolute; color: #00ff88; font-family: monospace; font-size: 18px; }
    canvas { display: block; }
    #outer-controls { display: flex; gap: 8px; margin-top: 8px; }
    #outer-controls button {
      background: #222; color: #ccc; border: 1px solid #444; padding: 6px 14px;
      font-family: monospace; font-size: 12px; cursor: pointer; border-radius: 3px;
    }
    #outer-controls button:hover { background: #333; color: #fff; }
    #outer-controls button.active { background: #004422; color: #00ff88; border-color: #00ff88; }
    #pause-btn.paused { background: #442200; color: #ffaa00; border-color: #ffaa00; }

    /* Pause overlay */
    #pause-overlay {
      display: none; position: absolute; top: 0; left: 0; width: 800px; height: 600px;
      background: rgba(0,0,0,0.7); z-index: 1000;
      justify-content: center; align-items: center;
    }
    #pause-overlay.visible { display: flex; }
    #pause-overlay span { color: #ffaa00; font-size: 32px; font-family: monospace; font-weight: bold; }

    /* Doc modal */
    #doc-modal {
      display: none; position: absolute; top: 0; left: 0; width: 800px; height: 600px;
      background: rgba(0,0,0,0.88); z-index: 1100;
      flex-direction: column; padding: 20px 30px; overflow: hidden;
    }
    #doc-modal.visible { display: flex; }
    #doc-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    #doc-modal-title { color: #00ff88; font-size: 18px; font-weight: bold; }
    #doc-modal-close { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 4px 10px; cursor: pointer; font-family: monospace; font-size: 14px; border-radius: 3px; }
    #doc-modal-close:hover { background: #441111; }
    #doc-modal-body { color: #ccc; font-size: 12px; line-height: 1.6; overflow-y: auto; flex: 1; white-space: pre-wrap; }
    #doc-modal-body h3 { color: #ffcc00; margin: 10px 0 4px; font-size: 13px; }
    #doc-modal-body .stat-table { color: #aaa; margin: 4px 0 8px; }
    /* Fullscreen warning */
    #fs-warning {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.93);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 28px;
      text-align: center; padding: 40px;
    }
    #fs-warning.hidden { display: none; }
    #fs-warning h1 {
      color: #ff4444; font-size: 48px; font-family: monospace; font-weight: bold;
      text-shadow: 0 0 20px #ff2222;
      animation: fspulse 1.2s ease-in-out infinite;
    }
    #fs-warning p { color: #cccccc; font-size: 20px; font-family: monospace; max-width: 600px; line-height: 1.5; }
    #fs-btn {
      background: #00aa55; color: #fff; border: 2px solid #00ff88;
      padding: 18px 44px; font-size: 22px; font-family: monospace;
      cursor: pointer; border-radius: 6px; font-weight: bold;
      box-shadow: 0 0 24px #00ff8855;
      animation: fspulse 1.2s ease-in-out infinite;
    }
    #fs-btn:hover { background: #00cc66; box-shadow: 0 0 40px #00ff88aa; }
    #fs-skip { color: #555; font-size: 13px; font-family: monospace; cursor: pointer; text-decoration: underline; margin-top: -10px; }
    #fs-skip:hover { color: #888; }
    @keyframes fspulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  </style>
  <script type="module" crossorigin src="/survivalpowder/assets/index-CFGZp28R.js"></script>
</head>
<body>
  <!-- Fullscreen warning -->
  <div id="fs-warning">
    <h1>&#9888; ATEN&#199;&#195;O &#9888;</h1>
    <p>Este jogo foi feito para rodar em <strong style="color:#00ff88">tela cheia</strong>.<br>A experi&#234;ncia em janela pequena &#233; bem pior.</p>
    <button id="fs-btn">&#9974; Clique aqui para Fullscreen</button>
    <span id="fs-skip">Continuar sem fullscreen</span>
  </div>

  <div id="loading">Carregando PowderSurvival...</div>
  <div id="game-wrapper">
    <div id="game-container"></div>
    <div id="pause-overlay"><span>⏸ PAUSADO</span></div>
    <div id="doc-modal">
      <div id="doc-modal-header">
        <span id="doc-modal-title"></span>
        <button id="doc-modal-close">[ X ] Fechar</button>
      </div>
      <div id="doc-modal-body"></div>
    </div>
  </div>
  <div id="outer-controls">
    <button id="pause-btn" title="SPACE para pausar/retomar">⏸ Pausar</button>
    <button id="doc-rules-btn">📖 Regras e UX</button>
    <button id="doc-stats-btn">📊 Stats Completo</button>
    <button id="doc-tips-btn">💡 Dicas</button>
    <button id="doc-related-btn">🔗 Relacionados</button>
    <button id="music-btn" title="Toggle música ambiente">🎵 Música: ON</button>
    <button id="sfx-btn" title="Toggle efeitos sonoros">🔊 SFX: ON</button>
  </div>
  <script>
    const fsWarning = document.getElementById('fs-warning');
    const fsBtn = document.getElementById('fs-btn');
    const fsSkip = document.getElementById('fs-skip');
    function isFS() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
    }
    function goFS() {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
    }
    function hideWarn() { fsWarning.classList.add('hidden'); }
    fsBtn.addEventListener('click', function() { goFS(); hideWarn(); });
    fsSkip.addEventListener('click', hideWarn);
    document.addEventListener('fullscreenchange', function() {
      if (!isFS()) fsWarning.classList.remove('hidden');
    });
    if (isFS()) hideWarn();
  </script>
</body>
</html>
